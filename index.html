<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Car Scene - Mobile Controls</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* Prevent scrollbars */
            background-color: #a0d7e6;
            /* Light sky blue background */
            font-family: 'Press Start 2P', cursive, sans-serif;
            /* A retro arcade font for style */
            /* Prevent default touch behaviors like pull-to-refresh or selection */
            overscroll-behavior: none;
            touch-action: none;
            /* For pointer events, might help on some devices */
        }

        canvas {
            display: block;
            /* Remove annoying space below canvas */
        }

        #loading-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: white;
            display: flex;
            flex-direction: column;
            /* For progress text */
            justify-content: center;
            align-items: center;
            font-size: 2em;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.5s ease-out;
            gap: 15px;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
            /* Disable interaction after fading */
        }

        #loading-text {
            font-size: 1em;
        }

        #loading-progress {
            font-size: 0.8em;
        }

        /* --- UI Elements --- */
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 50;
            pointer-events: none;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        /* Updated Score Design */
       /* মেইন কন্টেইনার */
#ui-container {
    position: absolute;
    top: 30px; /* একটু নিচে নামিয়ে দেওয়া হয়েছে */
    left: 0;
    right: 0;
    padding: 0 30px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    z-index: 100;
}

/* বড় এবং স্পষ্ট স্কোর বোর্ড */
#score {
    background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(50,50,50,0.6));
    padding: 15px 30px;
    border-radius: 20px;
    border: 3px solid #ffd700; /* মোটা বর্ডার */
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); /* গ্লোয়িং ইফেক্ট */
    text-align: center;
}

#score-label {
    display: block;
    font-size: 14px;
    color: #ffd700;
    margin-bottom: 5px;
    text-transform: uppercase;
    font-weight: bold;
}

#score-val {
    font-family: 'Press Start 2P', cursive;
    font-size: 32px; /* অনেক বড় ফন্ট */
    color: #ffffff;
    text-shadow: 2px 2px 0px #000;
}

/* আধুনিক ও বড় স্পিডোমিটার */
#speedometer-container {
    background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,100,100,0.5));
    padding: 15px 30px;
    border-radius: 20px;
    border: 3px solid #00ffcc;
    box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
    text-align: center;
}

#speed-label {
    display: block;
    font-size: 14px;
    color: #00ffcc;
    margin-bottom: 5px;
    font-weight: bold;
}

#current-speed {
    font-family: 'Press Start 2P', cursive;
    font-size: 40px; /* স্পিড খুব বড় দেখাবে */
    color: #ffffff;
    text-shadow: 0 0 10px #00ffcc;
}

.unit {
    font-size: 16px;
    color: #00ffcc;
    margin-left: 10px;
    vertical-align: middle;
}

/* হাই স্পিড এনিমেশন */
.fast-speed {
    color: #ff0000 !important;
    text-shadow: 0 0 20px #ff0000 !important;
    animation: pulse 0.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

      

        #restart-button {
            background-color: #21c60ffc;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            /* Relative to parent font-size */
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
            transition: background-color 0.3s ease;
        }

        #restart-button:hover {
            background-color: #0056b3;
        }


        /* --- Mobile Control Buttons --- */
        .control-button {
            position: absolute;
            bottom: 30px;
            width: 85px;
            height: 85px;
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            z-index: 60;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5em;
            color: white;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .control-button:active {
            background-color: rgba(255, 255, 255, 0.5);
            transform: scale(0.85);
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        #left-button { left: 40px;
                    margin-bottom: 50px;
                }
        #right-button { left: 170px;
                        margin-bottom: 50px; } 

        /* Action Buttons Design */
        .action-button {
            position: absolute;
            bottom: 30px;
            width: 80px;
            height: 80px;
            margin-bottom: 50px;
            margin-right: 30px;
            border-radius: 18px;
            z-index: 70;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 11px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #stop-btn { 
            right: 230px; 
            background: linear-gradient(145deg, #ff416c, #ff4b2b);
            box-shadow: 0 6px #900, 0 8px 15px rgba(0,0,0,0.3);
        }
        #stop-btn:active { transform: translateY(6px); box-shadow: 0 0 #900; }

        #speed-btn { 
            right: 125px; 
            background: linear-gradient(145deg, #00b09b, #96c93d);
            box-shadow: 0 6px #050, 0 8px 15px rgba(0,0,0,0.3);
        }
        #speed-btn:active { transform: translateY(6px); box-shadow: 0 0 #050; }

        #horn-btn { 
            right: 20px; 
            background: linear-gradient(145deg, #f7971e, #ffd200);
            box-shadow: 0 6px #850, 0 8px 15px rgba(0,0,0,0.3);
        }
        #horn-btn:active { transform: translateY(6px); box-shadow: 0 0 #850; }

        .btn-icon { font-size: 26px; margin-bottom: 4px; }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            flex-direction: column;
            gap: 20px;
            z-index: 200;
            font-size: 2em;
        }

        /* --- End Mobile Control Buttons --- */

        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        
    </style>
</head>

<body>
    <div id="loading-screen">
        <div id="loading-text">Loading Game...</div>
        <div id="loading-progress">0%</div>
    </div>
    <div id="container"></div>

   <div id="ui-container">
    <div id="score">
        <span id="score-label">TOTAL DISTANCE</span>
        <span id="score-val">0000</span>
    </div>
    <div id="speedometer-container">
        <span id="speed-label">VELOCITY</span>
        <span id="current-speed">0</span>
        <span class="unit">KM/H</span>
    </div>
</div>
    <div id="game-over">
        GAME OVER!
        <button id="restart-button">Restart</button>
    </div>

    <div id="left-button" class="control-button">◀</div>
    <div id="right-button" class="control-button">▶</div>

    <div id="stop-btn" class="action-button">
        <span class="btn-icon">🛑</span>STOP
    </div>
    <div id="speed-btn" class="action-button">
        <span class="btn-icon">⚡</span>SPEED
    </div>
    <div id="horn-btn" class="action-button">
        <span class="btn-icon">📢</span>HORN
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        let scene, camera, renderer, carModel, enemyCar;
        let ambientLight, directionalLight;
        let road, roadLines = [], kerbs = [];
        let buildings = [], streetLights = [], trafficLights = [];
        const roadWidth = 10;
        const roadLength = 200; 
        const sceneryRecycleDistance = roadLength / 2; 
        const buildingSpacing = 15;
        const lightSpacing = 30;
        const numBuildings = Math.floor(roadLength * 1.5 / buildingSpacing);
        const numLights = Math.floor(roadLength * 1.5 / lightSpacing);

        let driveSpeed = 0.5; 
        // --- Sound variables ---
        let audioCtx, engineOsc, engineGain;
        let isAudioInitialized = false;

        const normalDriveSpeed = 0.5;
        const enemyCarSpeed = 0.6; 

        const kerbHeight = 0.2;
        const kerbWidth = 0.3;

        let moveLeft = false;
        let moveRight = false;
        let isSpeeding = false; 
        let isStopping = false; 
        
        const carMoveSpeed = 0.15; 
        let carBaseY = 0; 
        let score = 0;
        let isGameOver = false;

        const points = [];
        const numPoints = 15;
        const pointValue = 10;
        let pointGeometry, pointMaterial;
        const pointRadius = 0.3;

        const loadingScreen = document.getElementById('loading-screen');
        const loadingProgress = document.getElementById('loading-progress');
        const scoreElement = document.getElementById('score');
        const speedValElement = document.getElementById('current-speed');
        const gameOverElement = document.getElementById('game-over');
        const restartButton = document.getElementById('restart-button');

        let playerBox = new THREE.Box3();
        let enemyBox = new THREE.Box3();
        let pointBox = new THREE.Box3();

        const loadingManager = new THREE.LoadingManager();

        loadingManager.onLoad = () => {
            loadingScreen.classList.add('hidden');
            setTimeout(() => {
                if (loadingScreen) loadingScreen.style.display = 'none';
                if (!isGameOver) animate();
            }, 600);
        };
        loadingManager.onProgress = (url, itemsLoaded, itemsTotal) => {
            const progress = Math.round((itemsLoaded / itemsTotal) * 100);
            loadingProgress.textContent = `${progress}%`;
        };

        init();
        setupControls();
        

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa0d7e6);
            scene.fog = new THREE.Fog(0xa0d7e6, roadLength * 0.4, roadLength * 0.9);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, -7);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('container').appendChild(renderer.domElement);

            ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
            directionalLight.position.set(50, 100, 50);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);
            scene.add(directionalLight.target);

            const hdrPath = 'https://threejs.org/examples/textures/equirectangular/';
            const hdrName = 'venice_sunset_1k.hdr';

            new RGBELoader(loadingManager)
                .setPath(hdrPath)
                .load(hdrName, function (texture) {
                    texture.mapping = THREE.EquirectangularReflectionMapping;
                    scene.environment = texture;
                    scene.background = texture;
                }, undefined, (error) => {
                    scene.background = new THREE.Color(0xa0d7e6);
                });

            const groundGeo = new THREE.PlaneGeometry(roadWidth * 5, roadLength * 1.5);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x55aa55, side: THREE.DoubleSide, roughness: 0.9, metalness: 0.1 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.05;
            ground.receiveShadow = true;
            scene.add(ground);

            const roadGeo = new THREE.PlaneGeometry(roadWidth, roadLength * 1.5);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.7, metalness: 0.1 });
            road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.receiveShadow = true;
            scene.add(road);

            const lineLength = 4;
            const lineGap = 4;
            const numLines = Math.floor(roadLength * 1.5 / (lineLength + lineGap));
            const lineGeo = new THREE.PlaneGeometry(0.3, lineLength);
            const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide, roughness: 0.2, metalness: 0.0 });
            for (let i = 0; i < numLines; i++) {
                const line = new THREE.Mesh(lineGeo, lineMat);
                line.rotation.x = -Math.PI / 2;
                line.position.y = 0.005;
                line.position.z = (roadLength * 1.5 / 2) - (lineLength / 2) - i * (lineLength + lineGap);
                line.receiveShadow = true;
                roadLines.push(line);
                scene.add(line);
            }

            function createKerbTexture() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 64;
                canvas.height = 16;
                const stripeWidth = 8;
                const colors = ['#ff0000', '#ffffff'];
                for (let i = 0; i < canvas.width / stripeWidth; i++) {
                    ctx.fillStyle = colors[i % 2];
                    ctx.fillRect(i * stripeWidth, 0, stripeWidth, canvas.height);
                }
                return new THREE.CanvasTexture(canvas);
            }
            const kerbTexture = createKerbTexture();
            kerbTexture.wrapS = THREE.RepeatWrapping;
            kerbTexture.repeat.set(roadLength * 1.5 / 4, 1);
            const kerbGeo = new THREE.BoxGeometry(kerbWidth, kerbHeight, roadLength * 1.5);
            const kerbMat = new THREE.MeshStandardMaterial({ map: kerbTexture, roughness: 0.7, metalness: 0.1 });

            const kerbLeft = new THREE.Mesh(kerbGeo, kerbMat);
            kerbLeft.position.set(-(roadWidth / 2) - (kerbWidth / 2), kerbHeight / 2, 0);
            kerbLeft.castShadow = true;
            kerbLeft.receiveShadow = true;
            scene.add(kerbLeft);
            kerbs.push(kerbLeft);

            const kerbRight = new THREE.Mesh(kerbGeo, kerbMat);
            kerbRight.position.set((roadWidth / 2) + (kerbWidth / 2), kerbHeight / 2, 0);
            kerbRight.castShadow = true;
            kerbRight.receiveShadow = true;
            scene.add(kerbRight);
            kerbs.push(kerbRight);

            function createBuilding() {
                const height = Math.random() * 30 + 10;
                const width = Math.random() * 8 + 4;
                const depth = Math.random() * 8 + 4;
                const buildingGeo = new THREE.BoxGeometry(width, height, depth);
                const buildingMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color(Math.random() * 0.6 + 0.2, Math.random() * 0.6 + 0.2, Math.random() * 0.6 + 0.2),
                    roughness: 0.8,
                    metalness: 0.1
                });
                const building = new THREE.Mesh(buildingGeo, buildingMat);
                building.position.y = height / 2;
                building.castShadow = true;
                building.receiveShadow = true;
                return building;
            }
            for (let i = 0; i < numBuildings; i++) {
                const buildingLeft = createBuilding();
                const buildingRight = createBuilding();
                const zPos = (roadLength * 1.5 / 2) - (buildingSpacing / 2) - i * buildingSpacing;
                const xOffsetLeft = roadWidth / 2 + kerbWidth + 1 + Math.random() * 5 + buildingLeft.geometry.parameters.width / 2;
                const xOffsetRight = roadWidth / 2 + kerbWidth + 1 + Math.random() * 5 + buildingRight.geometry.parameters.width / 2;
                buildingLeft.position.set(-xOffsetLeft, buildingLeft.position.y, zPos);
                buildingRight.position.set(xOffsetRight, buildingRight.position.y, zPos);
                buildings.push(buildingLeft, buildingRight);
                scene.add(buildingLeft);
                scene.add(buildingRight);
            }

            function createStreetLight() {
                const group = new THREE.Group();
                const poleHeight = 6;
                const poleRadius = 0.1;
                const poleGeo = new THREE.CylinderGeometry(poleRadius, poleRadius, poleHeight);
                const poleMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.4 });
                const pole = new THREE.Mesh(poleGeo, poleMat);
                pole.castShadow = true;
                pole.position.y = poleHeight / 2;
                group.add(pole);

                const armLength = 1.5;
                const armGeo = new THREE.BoxGeometry(armLength, poleRadius * 1.5, poleRadius * 1.5);
                const arm = new THREE.Mesh(armGeo, poleMat);
                arm.position.set(0, poleHeight - poleRadius * 2, 0);
                group.add(arm);

                const lightFixtureGeo = new THREE.SphereGeometry(poleRadius * 2, 16, 8);
                const lightFixtureMat = new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0xffff00, emissiveIntensity: 0.5 });
                const lightFixture = new THREE.Mesh(lightFixtureGeo, lightFixtureMat);
                lightFixture.position.set(0, poleHeight - poleRadius * 2, 0);
                group.add(lightFixture);
                group.userData.armLength = armLength;
                return group;
            }
            for (let i = 0; i < numLights; i++) {
                const lightLeft = createStreetLight();
                const lightRight = createStreetLight();
                const zPos = (roadLength * 1.5 / 2) - (lightSpacing / 2) - i * lightSpacing;
                const xPos = roadWidth / 2 + kerbWidth + 0.8;
                lightLeft.position.set(-xPos, 0, zPos);
                lightLeft.rotation.y = Math.PI / 2;
                lightLeft.children[1].position.x = -lightLeft.userData.armLength / 2;
                lightLeft.children[2].position.x = -lightLeft.userData.armLength;
                streetLights.push(lightLeft);
                scene.add(lightLeft);

                lightRight.position.set(xPos, 0, zPos);
                lightRight.rotation.y = -Math.PI / 2;
                lightRight.children[1].position.x = -lightRight.userData.armLength / 2;
                lightRight.children[2].position.x = -lightRight.userData.armLength;
                streetLights.push(lightRight);
                scene.add(lightRight);
            }

            function createTrafficLight() {
                const group = new THREE.Group();
                const poleHeight = 5;
                const poleRadius = 0.15;
                const poleGeo = new THREE.CylinderGeometry(poleRadius, poleRadius, poleHeight);
                const poleMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.7, roughness: 0.5 });
                const pole = new THREE.Mesh(poleGeo, poleMat);
                pole.position.y = poleHeight / 2;
                pole.castShadow = true;
                group.add(pole);
                const housingWidth = 0.5;
                const housingHeight = 1.2;
                const housingDepth = 0.3;
                const housingGeo = new THREE.BoxGeometry(housingWidth, housingHeight, housingDepth);
                const housingMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
                const housing = new THREE.Mesh(housingGeo, housingMat);
                housing.position.y = poleHeight - housingHeight / 2;
                housing.castShadow = true;
                group.add(housing);
                const lightRadius = housingWidth * 0.25;
                const lightGeo = new THREE.SphereGeometry(lightRadius, 16, 8);
                const redMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xaa0000, emissiveIntensity: 1 });
                const yellowMat = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0xaaaa00, emissiveIntensity: 1 });
                const greenMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00aa00, emissiveIntensity: 1 });
                const redLight = new THREE.Mesh(lightGeo, redMat); redLight.position.set(0, housingHeight * 0.3, housingDepth / 2 + 0.01); housing.add(redLight);
                const yellowLight = new THREE.Mesh(lightGeo, yellowMat); yellowLight.position.set(0, 0, housingDepth / 2 + 0.01); housing.add(yellowLight);
                const greenLight = new THREE.Mesh(lightGeo, greenMat); greenLight.position.set(0, -housingHeight * 0.3, housingDepth / 2 + 0.01); housing.add(greenLight);
                return group;
            }
            const trafficLightLeft = createTrafficLight();
            const trafficLightRight = createTrafficLight();
            const trafficLightZ = roadLength * 0.4;
            const trafficLightX = roadWidth / 2 + kerbWidth + 0.5;
            trafficLightLeft.position.set(-trafficLightX, 0, trafficLightZ);
            trafficLightLeft.rotation.y = Math.PI / 2;
            trafficLightRight.position.set(trafficLightX, 0, trafficLightZ);
            trafficLightRight.rotation.y = -Math.PI / 2;
            trafficLights.push(trafficLightLeft, trafficLightRight);
            scene.add(trafficLightLeft);
            scene.add(trafficLightRight);

            pointGeometry = new THREE.SphereGeometry(pointRadius, 16, 16);
            pointMaterial = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0xaaaa00, emissiveIntensity: 0.8, metalness: 0.9, roughness: 0.1 });
            for (let i = 0; i < numPoints; i++) {
                const point = new THREE.Mesh(pointGeometry, pointMaterial);
                point.castShadow = true;
                point.receiveShadow = true;
                resetPointPosition(point, true);
                points.push(point);
                scene.add(point);
            }

            const loader = new GLTFLoader(loadingManager);
            const dracoLoader = new DRACOLoader(loadingManager);
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
            loader.setDRACOLoader(dracoLoader);
            const carUrl = 'https://threejs.org/examples/models/gltf/ferrari.glb';

            loader.load(carUrl, (gltf) => {
                carModel = gltf.scene;
                carModel.scale.set(0.8, 0.8, 0.8);
                const box = new THREE.Box3().setFromObject(carModel);
                carBaseY = -box.min.y + 0.01;
                carModel.position.set(0, carBaseY, 0);
                carModel.rotation.y = Math.PI;
                carModel.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });
                scene.add(carModel);

                enemyCar = carModel.clone();
                enemyCar.traverse((node) => {
                    if (node.isMesh) {
                        const originalMaterial = node.material;
                        const enemyMaterial = originalMaterial.clone();
                        enemyMaterial.color.setHex(0x0000ff);
                        enemyMaterial.metalness = 0.9;
                        enemyMaterial.roughness = 0.2;
                        node.material = enemyMaterial;
                    }
                });
                const initialEnemyX = (Math.random() < 0.5 ? -1 : 1) * roadWidth / 4;
                enemyCar.position.set(initialEnemyX, carBaseY, roadLength * 0.7);
                enemyCar.rotation.y = Math.PI;
                scene.add(enemyCar);

                camera.position.set(0, carBaseY + 3, -7);
                camera.lookAt(carModel.position.x, carBaseY + 1, carModel.position.z + 5);

            }, undefined, (error) => {
                const fallbackGeo = new THREE.BoxGeometry(2, 1, 4);
                const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.5, metalness: 0.5 });
                carModel = new THREE.Mesh(fallbackGeo, fallbackMat);
                carBaseY = 0.5 + 0.01;
                carModel.position.set(0, carBaseY, 0);
                scene.add(carModel);
                enemyCar = new THREE.Mesh(fallbackGeo, new THREE.MeshStandardMaterial({ color: 0x0000ff }));
                enemyCar.position.set(roadWidth / 4, carBaseY, roadLength * 0.7);
                scene.add(enemyCar);
            });

            restartButton.addEventListener('click', restartGame);
            window.addEventListener('resize', onWindowResize, false);
            updateScoreDisplay();
        }

        // --- NEW SOUND INITIALIZATION FUNCTION ---
        function initEngineSound() {
            if (isAudioInitialized) return;
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            engineOsc = audioCtx.createOscillator();
            engineGain = audioCtx.createGain();

            engineOsc.type = 'sawtooth'; // Karkash engine sound
            engineOsc.frequency.value = 60; // Base frequency
            
            engineGain.gain.value = 0.05; // Base volume
            
            engineOsc.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            
            engineOsc.start();
            isAudioInitialized = true;
        }

        function playHorn() {
    initEngineSound();
    
    const frequencies = [440, 554]; 
    
    frequencies.forEach(freq => {
        const osc = audioCtx.createOscillator();
        const gn = audioCtx.createGain();
        
        osc.type = 'sawtooth'; 
        osc.frequency.value = freq;
        
        gn.gain.setValueAtTime(0, audioCtx.currentTime);
        gn.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.02); 
        gn.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);    
        
        osc.connect(gn);
        gn.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3); 
    });

    // Animation block-ti ekhon ekhane nei, tai gari boro-choto hobe na
}

        function setupControls() {
            window.addEventListener('keydown', (event) => {
                if (isGameOver) return;
                initEngineSound(); // User interaction to start audio
                const key = event.key.toLowerCase();
                if (event.key === 'ArrowLeft' || key === 'a') { moveLeft = true; }
                else if (event.key === 'ArrowRight' || key === 'd') { moveRight = true; }
                else if (key === 'w' || event.key === 'ArrowUp') { isSpeeding = true; }
                else if (key === 's' || event.key === 'ArrowDown') { isStopping = true; }
                else if (key === 'h') { playHorn(); }
            });
            window.addEventListener('keyup', (event) => {
                const key = event.key.toLowerCase();
                if (event.key === 'ArrowLeft' || key === 'a') { moveLeft = false; }
                else if (event.key === 'ArrowRight' || key === 'd') { moveRight = false; }
                else if (key === 'w' || event.key === 'ArrowUp') { isSpeeding = false; }
                else if (key === 's' || event.key === 'ArrowDown') { isStopping = false; }
            });

            const leftBtn = document.getElementById('left-button');
            const rightBtn = document.getElementById('right-button');
            const stopBtn = document.getElementById('stop-btn');
            const speedBtn = document.getElementById('speed-btn');
            const hornBtn = document.getElementById('horn-btn');

            leftBtn.addEventListener('pointerdown', () => { initEngineSound(); moveLeft = true; });
            leftBtn.addEventListener('pointerup', () => moveLeft = false);
            rightBtn.addEventListener('pointerdown', () => { initEngineSound(); moveRight = true; });
            rightBtn.addEventListener('pointerup', () => moveRight = false);
            speedBtn.addEventListener('pointerdown', () => { initEngineSound(); isSpeeding = true; });
            speedBtn.addEventListener('pointerup', () => isSpeeding = false);
            stopBtn.addEventListener('pointerdown', () => { initEngineSound(); isStopping = true; });
            stopBtn.addEventListener('pointerup', () => isStopping = false);
            hornBtn.addEventListener('pointerdown', () => { initEngineSound(); playHorn(); });
        }

        function resetPointPosition(point, initial = false) {
            const laneWidth = roadWidth / 2 - kerbWidth - pointRadius * 2;
            point.position.x = (Math.random() * 2 - 1) * laneWidth;
            point.position.y = pointRadius + 0.01;
            if (initial) {
                point.position.z = Math.random() * roadLength * 0.8 - roadLength * 0.4;
            } else {
                point.position.z = roadLength / 2 + Math.random() * roadLength * 0.5;
            }
            point.visible = true;
        }

        function updateScoreDisplay() { 
            const scoreVal = document.getElementById('score-val');
            if(scoreVal) {
                scoreVal.textContent = score.toString().padStart(4, '0'); 
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isGameOver) {
                renderer.render(scene, camera);
                return;
            }

            if (isSpeeding) { driveSpeed = Math.min(driveSpeed + 0.02, 3.0); }
            else if (isStopping) { driveSpeed = Math.max(driveSpeed - 0.05, 0); }
            else {
                if (driveSpeed > normalDriveSpeed) driveSpeed -= 0.015;
                if (driveSpeed < normalDriveSpeed) driveSpeed += 0.01;
            }

            // --- DYNAMIC ENGINE SOUND UPDATE ---
            if (isAudioInitialized) {
                // Pitch based on speed
                let pitch = 60 + (driveSpeed * 120); 
                engineOsc.frequency.setTargetAtTime(pitch, audioCtx.currentTime, 0.1);
                // Volume based on speed
                let vol = 0.03 + (driveSpeed * 0.04);
                engineGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.1);
            }

            const speedKMH = Math.floor(driveSpeed * 120);
            if (speedValElement) {
                speedValElement.textContent = speedKMH;
                if (speedKMH > 100) {
                    speedValElement.classList.add('fast-speed');
                } else {
                    speedValElement.classList.remove('fast-speed');
                }
            }

            const deltaZ = driveSpeed;

            roadLines.forEach(line => {
                line.position.z -= deltaZ;
                if (line.position.z < -sceneryRecycleDistance) line.position.z += roadLength * 1.5;
            });

            buildings.forEach(building => {
                building.position.z -= deltaZ;
                if (building.position.z < -sceneryRecycleDistance - building.geometry.parameters.depth / 2) {
                    const sideSign = Math.sign(building.position.x);
                    const xOffset = roadWidth / 2 + kerbWidth + 1 + Math.random() * 5 + building.geometry.parameters.width / 2;
                    building.position.set(sideSign * xOffset, building.geometry.parameters.height / 2, roadLength * 1.5 / 2 + Math.random() * buildingSpacing * 2);
                }
            });

            streetLights.forEach(light => {
                light.position.z -= deltaZ;
                if (light.position.z < -sceneryRecycleDistance) {
                    const sideSign = Math.sign(light.position.x);
                    light.position.set(sideSign * (roadWidth / 2 + kerbWidth + 0.8), 0, roadLength * 1.5 / 2 + Math.random() * lightSpacing * 2);
                }
            });

            trafficLights.forEach(light => {
                light.position.z -= deltaZ;
                if (light.position.z < -sceneryRecycleDistance) {
                    const sideSign = Math.sign(light.position.x);
                    light.position.set(sideSign * (roadWidth / 2 + kerbWidth + 0.5), 0, roadLength * 1.5 / 2 + Math.random() * roadLength * 0.5);
                }
            });

            kerbs.forEach(kerb => {
                kerb.position.z -= deltaZ;
                if (kerb.position.z < -sceneryRecycleDistance) kerb.position.z += roadLength * 1.5;
            });

            points.forEach(point => {
                if (!point.visible) return;
                point.position.z -= deltaZ;
                if (point.position.z < -sceneryRecycleDistance) resetPointPosition(point);
            });
if (enemyCar && carModel) {
    enemyCar.position.z -= (enemyCarSpeed + driveSpeed);

    if (enemyCar.position.z < -sceneryRecycleDistance) {
        // ১. মাঝখানসহ যেকোনো পজিশনে রিসেট
        const range = (roadWidth / 2 - kerbWidth - 1);
        enemyCar.position.x = (Math.random() * 2 - 1) * range; 
        enemyCar.position.z = roadLength * 0.7 + Math.random() * roadLength * 0.5;

        // ২. ডিজাইন এক রেখে রঙ বদলানো
        enemyCar.traverse((node) => {
            if (node.isMesh && node.material) {
                node.material = node.material.clone();
                // শুধু বডি পার্টের কালার বদলানো
                if (node.material.name.toLowerCase().includes('body') || 
                    node.name.toLowerCase().includes('body')) {
                    node.material.color.setHex(Math.random() * 0xffffff);
                }
            }
        });
    }
}

            if (carModel && carBaseY > 0) {
    let maxBounds = roadWidth / 2 - kerbWidth - 1;
    // Ebar Left-e chap dile gari Left-e jabe
    if (moveLeft && carModel.position.x < maxBounds) { carModel.position.x += carMoveSpeed; }
    // Right-e chap dile gari Right-e jabe
    if (moveRight && carModel.position.x > -maxBounds) { carModel.position.x -= carMoveSpeed; }
    playerBox.setFromObject(carModel);
}

            if (carModel) {
                camera.position.x += (carModel.position.x * 0.5 - camera.position.x) * 0.1;
                camera.lookAt(carModel.position.x, carBaseY + 1, carModel.position.z + 5);

                points.forEach(point => {
                    if (!point.visible) return;
                    pointBox.setFromObject(point);
                    if (playerBox.intersectsBox(pointBox)) {
                        score += pointValue; updateScoreDisplay(); point.visible = false;
                    }
                });

                if (enemyCar) {
                    enemyBox.setFromObject(enemyCar);
                    if (playerBox.clone().expandByScalar(0.2).intersectsBox(enemyBox)) {
                        isGameOver = true; 
                        gameOverElement.style.display = 'flex';
                        // Stop sound on game over
                        if(isAudioInitialized) engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        function restartGame() {
            isGameOver = false; score = 0; driveSpeed = normalDriveSpeed;
            updateScoreDisplay(); gameOverElement.style.display = 'none';
            if (carModel) carModel.position.set(0, carBaseY, 0);
           if (enemyCar) {
    const range = (roadWidth / 2 - kerbWidth - 1);
    enemyCar.position.set((Math.random() * 2 - 1) * range, carBaseY, roadLength * 0.7);
}
            points.forEach(point => resetPointPosition(point, true));
            // Restart sound volume
            if(isAudioInitialized) engineGain.gain.setTargetAtTime(0.05, audioCtx.currentTime, 0.1);
        }

    </script>
